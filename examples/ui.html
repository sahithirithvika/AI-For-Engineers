<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI for Engineers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 16px 32px;
      overflow-x: hidden;
    }

    /* Floating math symbols canvas */

    header { text-align: center; position: relative; z-index: 1; }
    header h1 {
      font-size: 2.2rem;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      letter-spacing: 1px;
    }
    header p { color: #94a3b8; margin-top: 8px; font-size: 1rem; }

    body > .card { margin-top: auto; }

    .card {
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(96, 165, 250, 0.07), 0 8px 32px rgba(0,0,0,0.8);
      padding: 20px;
      width: 100%;
      max-width: 700px;
      position: relative;
      z-index: 1;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      transition: border-color 0.2s;
    }
    .input-area:focus-within { border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,0.15); }

    textarea {
      width: 100%;
      border: none;
      padding: 14px 16px;
      font-size: 15px;
      resize: none;
      min-height: 90px;
      outline: none;
      font-family: inherit;
      color: #e2e8f0;
      background: transparent;
    }
    textarea::placeholder { color: #64748b; }

    .toolbar {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      gap: 6px;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 7px;
      border-radius: 8px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: rgba(167,139,250,0.15); color: #a78bfa; }
    .icon-btn.active { color: #f87171; background: rgba(248,113,113,0.15); }
    .icon-btn svg { width: 20px; height: 20px; }

    .send-btn {
      margin-left: auto;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }
    .send-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .result { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 16px; }
    .result h2 { font-size: 1.1rem; color: #a78bfa; margin-bottom: 12px; }
    .error { color: #f87171; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 12px; }
    .answer { color: #cbd5e1; line-height: 1.8; }
    .steps { margin-top: 14px; }
    .steps li { margin: 6px 0 6px 20px; color: #94a3b8; }
    .note { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #fbbf24; margin-bottom: 14px; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status { font-size: 13px; color: #64748b; margin-top: 8px; text-align: center; }

    /* Camera modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: #000000; border: 1px solid rgba(167,139,250,0.3); border-radius: 20px; padding: 24px; width: 480px; max-width: 95vw; }
    .modal h3 { margin-bottom: 14px; color: #a78bfa; }
    video { width: 100%; border-radius: 10px; background: #000; }
    .modal-actions { display: flex; gap: 10px; margin-top: 14px; }
    .modal-actions button { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-capture { background: linear-gradient(135deg, #7c3aed, #2563eb); color: white; }
    .btn-close { background: rgba(255,255,255,0.08); color: #94a3b8; }
    canvas { display: none; }
    #mathCanvas { display: block; position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  </style>
</head>
<body>

  <canvas id="mathCanvas"></canvas>

  <header>
    <h1>AI for Engineers</h1>
    <p>Your intelligent learning assistant</p>
  </header>

  <div class="card">
    <div class="input-area">
      <textarea id="question" placeholder="Ask your engineering question..."></textarea>
      <div class="toolbar">
        <button class="icon-btn" id="voiceBtn" title="Voice input" onclick="toggleVoice()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </button>
        <button class="icon-btn" id="cameraBtn" title="Camera input" onclick="openCamera()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>
        <button class="send-btn" id="btn" onclick="solve()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Send
        </button>
      </div>
    </div>
    <div class="status" id="status"></div>
    <div class="result" id="result" style="display:none"></div>
  </div>

  <!-- Camera Modal -->
  <div class="modal-overlay" id="cameraModal">
    <div class="modal">
      <h3>Capture Image</h3>
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <div class="modal-actions">
        <button class="btn-capture" onclick="capturePhoto()">Capture</button>
        <button class="btn-close" onclick="closeCamera()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // ── MATH DOODLE BACKGROUND ──
    const canvas = document.getElementById('mathCanvas');
    const ctx = canvas.getContext('2d');

    // Chalk-like colors on black
    const chalkColors = [
      'rgba(255,255,255,0.18)', 'rgba(255,255,255,0.12)',
      'rgba(180,180,255,0.2)',  'rgba(150,255,200,0.15)',
      'rgba(255,200,150,0.15)', 'rgba(200,150,255,0.18)'
    ];

    function rnd(min, max) { return min + Math.random() * (max - min); }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      drawDoodles();
    }

    function chalkStroke(c) {
      ctx.strokeStyle = c;
      ctx.lineWidth = rnd(0.8, 1.8);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.setLineDash([]);
    }

    // Wobbly line helper (hand-drawn feel)
    function wobblyLine(x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      const mx = (x1 + x2) / 2 + rnd(-6, 6);
      const my = (y1 + y2) / 2 + rnd(-6, 6);
      ctx.quadraticCurveTo(mx, my, x2, y2);
      ctx.stroke();
    }

    function drawTriangle(x, y, size, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      chalkStroke(color);
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.866, size * 0.5);
      ctx.lineTo(-size * 0.866, size * 0.5);
      ctx.closePath();
      ctx.stroke();
      // right angle mark
      ctx.beginPath();
      ctx.moveTo(-size * 0.866 + 10, size * 0.5);
      ctx.lineTo(-size * 0.866 + 10, size * 0.5 - 10);
      ctx.lineTo(-size * 0.866, size * 0.5 - 10);
      ctx.stroke();
      ctx.restore();
    }

    function drawProtractor(x, y, r, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      chalkStroke(color);
      // semicircle
      ctx.beginPath();
      ctx.arc(0, 0, r, Math.PI, 0);
      ctx.stroke();
      // base line
      wobblyLine(-r, 0, r, 0);
      // tick marks
      for (let a = 0; a <= 180; a += 30) {
        const rad = (a * Math.PI) / 180;
        const len = a % 90 === 0 ? 12 : 7;
        ctx.beginPath();
        ctx.moveTo(Math.cos(Math.PI - rad) * r, Math.sin(Math.PI - rad) * -r);
        ctx.lineTo(Math.cos(Math.PI - rad) * (r - len), Math.sin(Math.PI - rad) * -(r - len));
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawRuler(x, y, len, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      chalkStroke(color);
      // body
      ctx.strokeRect(-len / 2, -10, len, 20);
      // ticks
      for (let i = 0; i <= len; i += 12) {
        const h = i % 60 === 0 ? 14 : i % 24 === 0 ? 10 : 6;
        ctx.beginPath();
        ctx.moveTo(-len / 2 + i, -10);
        ctx.lineTo(-len / 2 + i, -10 + h);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawSineWave(x, y, width, color) {
      ctx.save();
      ctx.translate(x, y);
      chalkStroke(color);
      ctx.beginPath();
      for (let i = 0; i <= width; i += 2) {
        const wy = Math.sin((i / width) * Math.PI * 4) * 22 + rnd(-1, 1);
        i === 0 ? ctx.moveTo(i, wy) : ctx.lineTo(i, wy);
      }
      ctx.stroke();
      // axis
      wobblyLine(-10, 0, width + 10, 0);
      ctx.restore();
    }

    function drawCube(x, y, size, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      chalkStroke(color);
      const h = size * 0.5;
      // front face
      ctx.strokeRect(-size / 2, -size / 2, size, size);
      // back face offset
      ctx.strokeRect(-size / 2 + h, -size / 2 - h, size, size);
      // connecting lines
      wobblyLine(-size / 2, -size / 2, -size / 2 + h, -size / 2 - h);
      wobblyLine(size / 2, -size / 2, size / 2 + h, -size / 2 - h);
      wobblyLine(size / 2, size / 2, size / 2 + h, size / 2 - h);
      wobblyLine(-size / 2, size / 2, -size / 2 + h, size / 2 - h);
      // dashed hidden lines
      ctx.setLineDash([3, 4]);
      wobblyLine(-size / 2 + h, size / 2 - h, -size / 2, size / 2);
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawCompass(x, y, size, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      chalkStroke(color);
      // two legs
      wobblyLine(0, 0, -size * 0.4, size);
      wobblyLine(0, 0, size * 0.4, size);
      // hinge circle
      ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.stroke();
      // arc drawn by compass
      ctx.beginPath();
      ctx.arc(0, size * 0.85, size * 0.45, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
      ctx.restore();
    }

    function drawFormula(x, y, text, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = color;
      ctx.font = `italic ${rnd(14, 22)}px Georgia, serif`;
      ctx.fillText(text, 0, 0);
      ctx.restore();
    }

    function drawAxes(x, y, size, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      chalkStroke(color);
      wobblyLine(-size, 0, size, 0);
      wobblyLine(0, size, 0, -size);
      // arrowheads
      ctx.beginPath(); ctx.moveTo(size, 0); ctx.lineTo(size - 8, -5); ctx.lineTo(size - 8, 5); ctx.closePath(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -size); ctx.lineTo(-5, -size + 8); ctx.lineTo(5, -size + 8); ctx.closePath(); ctx.stroke();
      ctx.restore();
    }

    const formulas = [
      'y = sin x', 'y = cos x', 'E = mc²', 'F = ma', 'a² + b² = c²',
      'y = 3x + 6', 'V = x²l', '∫f(x)dx', '∑nᵢ', 'lim x→0',
      'π ≈ 3.14', '∂f/∂x', 'λ', 'μ', 'θ = 30°', 'C = a² + b²',
      'y = √x', 'log₂n', 'Δx', '∞', 'α + β', 'ω', 'σ²'
    ];

    function drawDoodles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const W = canvas.width, H = canvas.height;
      const cols = Math.ceil(W / 220);
      const rows = Math.ceil(H / 200);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const bx = c * 220 + rnd(10, 60);
          const by = r * 200 + rnd(10, 60);
          const color = pick(chalkColors);
          const angle = rnd(-0.4, 0.4);
          const type = Math.floor(rnd(0, 7));

          ctx.globalAlpha = 1;
          if (type === 0) drawTriangle(bx, by, rnd(30, 55), angle, color);
          else if (type === 1) drawProtractor(bx, by, rnd(35, 55), angle, color);
          else if (type === 2) drawRuler(bx, by, rnd(80, 130), angle, color);
          else if (type === 3) drawSineWave(bx, by, rnd(80, 140), color);
          else if (type === 4) drawCube(bx, by, rnd(30, 50), angle, color);
          else if (type === 5) drawCompass(bx, by, rnd(30, 50), angle, color);
          else if (type === 6) drawAxes(bx, by, rnd(30, 50), angle, color);

          // scatter formulas everywhere
          drawFormula(bx + rnd(-30, 80), by + rnd(-30, 80), pick(formulas), rnd(-0.3, 0.3), pick(chalkColors));
        }
      }
    }

    window.addEventListener('resize', resize);
    resize();

    // ── SOLVE ──
    async function solve() {
      const q = document.getElementById('question').value.trim();
      if (!q) return;
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      status.textContent = 'Sending to model...';
      result.style.display = 'none';
      try {
        const res = await fetch('http://localhost:5001/api/solve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q }),
          signal: AbortSignal.timeout(60000)
        });
        const data = await res.json();
        status.textContent = '';
        result.style.display = 'block';
        if (data.error || !data.success) {
          result.innerHTML = `<h2>Result</h2><div class="error">${data.error || 'Unknown error'}</div>`;
        } else {
          let stepsHtml = '';
          if (data.steps && data.steps.length > 0)
            stepsHtml = `<div class="steps"><strong style="color:#a78bfa">Steps:</strong><ul>${data.steps.map(s => `<li>${s}</li>`).join('')}</ul></div>`;
          result.innerHTML = `
            <h2>Solution</h2>
            <div class="note">Note: Model trained on limited data — outputs may be rough.</div>
            <div class="answer"><strong style="color:#60a5fa">Q:</strong> ${data.question}</div>
            <div class="answer" style="margin-top:10px"><strong style="color:#34d399">A:</strong> ${data.explanation}</div>
            ${stepsHtml}`;
        }
      } catch (err) {
        status.textContent = '';
        result.style.display = 'block';
        result.innerHTML = `<h2>Result</h2><div class="error">${err.name === 'TimeoutError' ? 'Request timed out (60s).' : 'Could not reach API on port 5001.'}</div>`;
      }
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send`;
    }

    document.getElementById('question').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.ctrlKey) solve();
    });

    // ── VOICE ──
    let recognition = null, isListening = false;
    function toggleVoice() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('Speech recognition not supported. Try Chrome.'); return; }
      const btn = document.getElementById('voiceBtn');
      if (isListening) { recognition.stop(); return; }
      recognition = new SR();
      recognition.lang = 'en-US';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.onstart = () => { isListening = true; btn.classList.add('active'); btn.title = 'Listening... click to stop'; };
      recognition.onresult = e => {
        const t = e.results[0][0].transcript;
        const ta = document.getElementById('question');
        ta.value += (ta.value ? ' ' : '') + t;
      };
      recognition.onend = () => { isListening = false; btn.classList.remove('active'); btn.title = 'Voice input'; };
      recognition.onerror = e => { isListening = false; btn.classList.remove('active'); alert('Voice error: ' + e.error); };
      recognition.start();
    }

    // ── CAMERA ──
    let stream = null;
    async function openCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('video').srcObject = stream;
        document.getElementById('cameraModal').classList.add('open');
      } catch (e) { alert('Camera access denied or not available.'); }
    }
    function capturePhoto() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const imageData = canvas.toDataURL('image/png');
      closeCamera();
      const ta = document.getElementById('question');
      ta.value += (ta.value ? '\n' : '') + '[Image captured — describe what you see or ask about it]';
      ta.focus();
      const result = document.getElementById('result');
      result.style.display = 'block';
      result.innerHTML = `<h2>Captured Image</h2><img src="${imageData}" style="width:100%;border-radius:10px;margin-top:8px">`;
    }
    function closeCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      document.getElementById('cameraModal').classList.remove('open');
    }
  </script>
</body>
</html>
