<!DOCTYPE html>
<!-- AI for Engineers v3.0 | Enhanced UI: MathJax, scrollbar, stock-market charts, collapsible steps -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI for Engineers</title>
  <!-- MathJax for proper math rendering -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
      options: { skipHtmlTags: ['script','noscript','style','textarea'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      height: 100vh;
      display: flex;
      padding: 0;
      overflow: hidden;
    }

    /* Floating math symbols canvas */

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(167, 139, 250, 0.2);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      z-index: 10;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .new-chat-btn {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .new-chat-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* Games Section */
    .games-section {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .games-title {
      color: #a78bfa;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .game-btn {
      background: rgba(167, 139, 250, 0.1);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 8px;
      padding: 12px 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      color: #e2e8f0;
      font-size: 12px;
    }

    .game-btn:hover {
      background: rgba(167, 139, 250, 0.2);
      border-color: #a78bfa;
      transform: translateY(-1px);
    }

    .game-icon {
      font-size: 20px;
      margin-bottom: 4px;
      display: block;
    }

    /* ── Flashcards ── */
    .flashcard-section {
      padding: 8px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .fc-open-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(99,102,241,0.1));
      border: 1px solid rgba(167,139,250,0.25);
      border-radius: 10px;
      cursor: pointer;
      transition: all .2s;
    }
    .fc-open-btn:hover {
      background: linear-gradient(135deg, rgba(124,58,237,0.28), rgba(99,102,241,0.2));
      border-color: rgba(167,139,250,0.5);
      transform: translateY(-1px);
    }
    /* Modal */
    .fc-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fc-modal {
      background: #0f172a;
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 20px;
      width: 480px;
      max-width: 95vw;
      padding: 28px;
      position: relative;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    }
    .fc-nav-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #e2e8f0;
      border-radius: 8px;
      width: 36px; height: 36px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .fc-nav-btn:hover { background: rgba(255,255,255,0.14); }
    .fc-card {
      perspective: 900px;
      height: 180px;
      cursor: pointer;
      margin: 18px 0 14px;
    }
    .fc-inner {
      position: relative;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform .5s cubic-bezier(.4,0,.2,1);
      border-radius: 16px;
    }
    .fc-inner.flipped { transform: rotateY(180deg); }
    .fc-front, .fc-back {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      text-align: center;
    }
    .fc-back { transform: rotateY(180deg); }
    .fc-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      opacity: .75;
      margin-bottom: 8px;
    }
    .fc-text {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.4;
      color: #fff;
    }
    .fc-dots {
      display: flex;
      justify-content: center;
      gap: 5px;
      flex-wrap: wrap;
    }
    .fc-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background .2s, transform .2s;
      cursor: pointer;
    }
    .fc-dot.active { background: #a78bfa; transform: scale(1.3); }

    /* Chat History */
    .chat-history {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
    }

    .chat-history-title {
      color: #94a3b8;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .chat-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chat-item:hover {
      background: rgba(167, 139, 250, 0.1);
      border-color: rgba(167, 139, 250, 0.3);
    }

    .chat-item.active {
      background: rgba(167, 139, 250, 0.2);
      border-color: #a78bfa;
    }

    .chat-preview {
      color: #e2e8f0;
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-time {
      color: #64748b;
      font-size: 11px;
      margin-top: 4px;
    }

    /* User Section */
    .user-section {
      padding: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
    }

    .user-details h4 {
      color: #e2e8f0;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .user-details p {
      color: #64748b;
      font-size: 12px;
    }

    .settings-btn {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .main-content::-webkit-scrollbar { width: 8px; }
    .main-content::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 4px; }
    .main-content::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.5); border-radius: 4px; }
    .main-content::-webkit-scrollbar-thumb:hover { background: rgba(167,139,250,0.8); }

    /* Scrollable results area in the middle */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 32px 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      scrollbar-width: thin;
      scrollbar-color: rgba(167,139,250,0.5) rgba(255,255,255,0.05);
    }
    .chat-area::-webkit-scrollbar { width: 8px; }
    .chat-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.5); border-radius: 4px; }

    /* Pinned bottom input area */
    .input-dock {
      flex-shrink: 0;
      padding: 12px 16px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(to top, #0d0d0d 80%, transparent);
      position: relative;
      z-index: 5;
    }

    .footer-text {
      text-align: center;
      padding: 8px 0 14px;
      font-size: 12px;
      color: #475569;
      letter-spacing: 0.3px;
    }

    header { text-align: center; position: relative; z-index: 1; }
    header h1 {
      font-size: 2.2rem;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      letter-spacing: 1px;
    }
    header p { color: #94a3b8; margin-top: 8px; font-size: 1rem; }

    body > .card { margin-top: auto; }

    .card {
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(96, 165, 250, 0.07), 0 8px 32px rgba(0,0,0,0.8);
      padding: 20px;
      width: 100%;
      max-width: 700px;
      position: relative;
      z-index: 1;
      margin-bottom: 40px;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      transition: border-color 0.2s;
    }
    .input-area:focus-within { border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,0.15); }

    textarea {
      width: 100%;
      border: none;
      padding: 14px 16px;
      font-size: 15px;
      resize: none;
      min-height: 90px;
      outline: none;
      font-family: inherit;
      color: #e2e8f0;
      background: transparent;
    }
    textarea::placeholder { color: #64748b; }

    .toolbar {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      gap: 6px;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 7px;
      border-radius: 8px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: rgba(167,139,250,0.15); color: #a78bfa; }
    .icon-btn.active { color: #f87171; background: rgba(248,113,113,0.15); }
    .icon-btn svg { width: 20px; height: 20px; }

    .send-btn {
      margin-left: auto;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }
    .send-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Enhanced Result Display ── */
    .result { margin-top: 8px; padding-top: 8px; width: 100%; max-width: 700px; }

    /* Answer card wrapper */
    .answer-card {
      background: rgba(10,10,20,0.95);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
      margin-bottom: 16px;
      animation: fadeSlideIn 0.3s ease;
    }
    @keyframes fadeSlideIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    /* Top banner */
    .answer-banner {
      background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(37,99,235,0.2));
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .answer-banner-left { display: flex; align-items: center; gap: 10px; }
    .answer-banner h2 { font-size: 1rem; color: #e2e8f0; margin: 0; font-weight: 600; }
    .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
    .badge-source { background: rgba(167,139,250,0.2); color: #c4b5fd; border: 1px solid rgba(167,139,250,0.3); }
    .badge-high { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
    .badge-medium { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }

    /* Question section */
    .ans-question {
      padding: 12px 18px;
      background: rgba(96,165,250,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: #93c5fd;
      font-size: 14px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .ans-question .q-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* Summary section */
    .ans-summary {
      padding: 14px 18px;
      background: rgba(52,211,153,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .ans-summary .s-icon { font-size: 20px; flex-shrink: 0; }
    .ans-summary-text { color: #a7f3d0; font-size: 15px; line-height: 1.7; font-weight: 500; }

    /* Steps section */
    .ans-steps { padding: 0; }
    .steps-header {
      padding: 12px 18px;
      background: rgba(167,139,250,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .steps-header:hover { background: rgba(167,139,250,0.14); }
    .steps-header-left { display: flex; align-items: center; gap: 8px; color: #a78bfa; font-size: 14px; font-weight: 600; }
    .steps-header .arrow { color: #a78bfa; font-size: 12px; transition: transform 0.3s; }
    .steps-header.open .arrow { transform: rotate(180deg); }
    .steps-list { overflow: hidden; max-height: 0; transition: max-height 0.4s ease; }
    .steps-list.open { max-height: 3000px; }

    .step-row {
      display: flex;
      gap: 14px;
      padding: 12px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      align-items: flex-start;
      transition: background 0.15s;
    }
    .step-row:hover { background: rgba(255,255,255,0.02); }
    .step-row:last-child { border-bottom: none; }
    .step-bubble {
      min-width: 28px; height: 28px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      flex-shrink: 0; margin-top: 1px;
      box-shadow: 0 2px 8px rgba(124,58,237,0.4);
    }
    .step-content { color: #cbd5e1; font-size: 14px; line-height: 1.75; }
    .step-content strong { color: #e2e8f0; }

    /* Concepts row */
    .ans-concepts {
      padding: 12px 18px;
      background: rgba(96,165,250,0.04);
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .ans-concepts-label { color: #64748b; font-size: 12px; margin-right: 4px; }
    .concept-tag {
      font-size: 11px; padding: 4px 10px; border-radius: 20px;
      background: rgba(96,165,250,0.12); color: #93c5fd;
      border: 1px solid rgba(96,165,250,0.2);
      display: flex; align-items: center; gap: 4px;
    }

    /* Verification box */
    .ans-verify {
      margin: 0 18px 14px;
      background: rgba(251,191,36,0.07);
      border: 1px solid rgba(251,191,36,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px; color: #fbbf24;
      display: flex; gap: 8px; align-items: flex-start;
    }

    /* Tips box */
    .ans-tips {
      margin: 0 18px 14px;
      background: rgba(167,139,250,0.06);
      border: 1px solid rgba(167,139,250,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px; color: #c4b5fd;
    }
    .ans-tips-title { font-weight: 600; margin-bottom: 6px; color: #a78bfa; }

    .result-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .result-header h2 { font-size: 1.1rem; color: #a78bfa; margin: 0; }
    .source-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); }
    .confidence-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; }
    .confidence-high { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
    .confidence-medium { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .question-box { background: rgba(96,165,250,0.08); border-left: 3px solid #60a5fa; border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 14px; color: #93c5fd; font-size: 14px; }
    .solution-box { background: rgba(52,211,153,0.08); border-left: 3px solid #34d399; border-radius: 0 8px 8px 0; padding: 12px 14px; margin-bottom: 16px; color: #6ee7b7; font-size: 15px; line-height: 1.7; }
    .steps-container { margin-bottom: 16px; }
    .steps-toggle { display: flex; align-items: center; justify-content: space-between; background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.2); border-radius: 10px; padding: 10px 14px; cursor: pointer; color: #a78bfa; font-size: 14px; font-weight: 600; transition: all 0.2s; user-select: none; }
    .steps-toggle:hover { background: rgba(167,139,250,0.18); }
    .steps-toggle .arrow { transition: transform 0.3s; font-size: 12px; }
    .steps-toggle.open .arrow { transform: rotate(180deg); }
    .steps-body { overflow: hidden; max-height: 0; transition: max-height 0.4s ease; }
    .steps-body.open { max-height: 2000px; }
    .step-item { display: flex; gap: 12px; padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); align-items: flex-start; }
    .step-item:last-child { border-bottom: none; }
    .step-num { min-width: 26px; height: 26px; background: linear-gradient(135deg, #7c3aed, #2563eb); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; flex-shrink: 0; margin-top: 1px; }
    .step-text { color: #cbd5e1; font-size: 14px; line-height: 1.7; }
    .concepts-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .concept-pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: rgba(96,165,250,0.1); color: #93c5fd; border: 1px solid rgba(96,165,250,0.25); }
    .verification-box { background: rgba(251,191,36,0.07); border: 1px solid rgba(251,191,36,0.2); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #fbbf24; display: flex; gap: 8px; align-items: flex-start; }
    .error { color: #f87171; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 12px; }
    .answer { color: #cbd5e1; line-height: 1.8; }
    .steps { margin-top: 14px; }
    .steps li { margin: 6px 0 6px 20px; color: #94a3b8; }
    .note { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #fbbf24; margin-bottom: 14px; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status { font-size: 13px; color: #64748b; margin-top: 8px; text-align: center; }

    /* Camera modal */

  <script>
    // ── FLASHCARDS ──
    const FC_CARDS = [
      { topic:'Calculus',      color:['#7c3aed','#4f46e5'], front:'d/dx(xⁿ)',                    back:'n · xⁿ⁻¹\nPower Rule' },
      { topic:'Calculus',      color:['#0ea5e9','#6366f1'], front:'∫ xⁿ dx',                     back:'xⁿ⁺¹ / (n+1) + C\nIntegration Power Rule' },
      { topic:'Calculus',      color:['#8b5cf6','#ec4899'], front:'d/dx(sin x)',                  back:'cos x' },
      { topic:'Calculus',      color:['#06b6d4','#3b82f6'], front:'d/dx(eˣ)',                     back:'eˣ\n(unchanged!)' },
      { topic:'Algebra',       color:['#f59e0b','#ef4444'], front:'Quadratic Formula',            back:'x = (−b ± √(b²−4ac)) / 2a' },
      { topic:'Algebra',       color:['#10b981','#059669'], front:'(a + b)²',                     back:'a² + 2ab + b²' },
      { topic:'Algebra',       color:['#f97316','#dc2626'], front:'Difference of Squares',        back:'a² − b² = (a+b)(a−b)' },
      { topic:'Trigonometry',  color:['#a855f7','#6366f1'], front:'sin²θ + cos²θ',               back:'= 1\nPythagorean Identity' },
      { topic:'Trigonometry',  color:['#14b8a6','#0ea5e9'], front:'sin(A+B)',                     back:'sinA·cosB + cosA·sinB' },
      { topic:'Trigonometry',  color:['#ec4899','#f43f5e'], front:'tan θ',                        back:'sin θ / cos θ' },
      { topic:'Linear Algebra',color:['#6366f1','#8b5cf6'], front:'det([[a,b],[c,d]])',           back:'ad − bc' },
      { topic:'Linear Algebra',color:['#0284c7','#0ea5e9'], front:'Dot Product A·B',              back:'|A||B|cos θ' },
      { topic:'Statistics',    color:['#16a34a','#15803d'], front:'Mean',                         back:'Σx / n\nSum of values ÷ count' },
      { topic:'Statistics',    color:['#ca8a04','#b45309'], front:'Standard Deviation',           back:'√(Σ(x−μ)² / n)' },
      { topic:'Physics',       color:['#dc2626','#b91c1c'], front:"Newton's 2nd Law",             back:'F = ma\nForce = mass × acceleration' },
      { topic:'Physics',       color:['#7c3aed','#5b21b6'], front:'Ohm\'s Law',                  back:'V = IR\nVoltage = Current × Resistance' },
    ];
    let fcIndex = 0;

    function fcInit() {
      fcIndex = 0;
      fcRender();
    }

    function fcRender() {
      const c = FC_CARDS[fcIndex];
      const inner = document.getElementById('fcInner');
      const front = document.getElementById('fcFront');
      const back  = document.getElementById('fcBack');
      if (!inner) return;
      inner.classList.remove('flipped');
      const [c1, c2] = c.color;
      front.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
      front.innerHTML = `<div class="fc-label" style="color:rgba(255,255,255,0.75);">📌 ${c.topic}</div><div class="fc-text">${c.front}</div><div style="color:rgba(255,255,255,0.5);font-size:.65rem;margin-top:6px;">tap to reveal</div>`;
      back.style.background = `linear-gradient(135deg, ${c2}, ${c1})`;
      back.innerHTML = `<div class="fc-label" style="color:rgba(255,255,255,0.75);">✅ Answer</div><div class="fc-text" style="white-space:pre-line;">${c.back}</div>`;
      // dots
      const dots = document.getElementById('fcDots');
      const visible = FC_CARDS.slice(Math.max(0,fcIndex-2), fcIndex+5);
      const offset  = Math.max(0, fcIndex-2);
      dots.innerHTML = FC_CARDS.map((_,i) => `<div class="fc-dot ${i===fcIndex?'active':''}" onclick="fcGoto(${i})"></div>`).join('');
    }

    function fcFlip() {
      document.getElementById('fcInner').classList.toggle('flipped');
    }

    function fcNext() {
      fcIndex = (fcIndex + 1) % FC_CARDS.length;
      fcRender();
    }

    function fcPrev() {
      fcIndex = (fcIndex - 1 + FC_CARDS.length) % FC_CARDS.length;
      fcRender();
    }

    function fcGoto(i) {
      fcIndex = i;
      fcRender();
    }


    function openFlashcards() {
      if (document.getElementById('fcOverlay')) return;
      fcIndex = 0;
      var overlay = document.createElement('div');
      overlay.id = 'fcOverlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:2000;display:flex;align-items:center;justify-content:center;';
      overlay.onclick = function(e){ if(e.target===overlay) closeFlashcards(); };
      overlay.innerHTML = '<div style="background:#0f172a;border:1px solid rgba(167,139,250,0.3);border-radius:20px;width:460px;max-width:95vw;padding:28px;position:relative;box-shadow:0 32px 80px rgba(0,0,0,0.7);">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">'
        + '<div><div style="color:#fff;font-size:1rem;font-weight:700;">⚡ Flash Cards</div>'
        + '<div style="color:#64748b;font-size:.75rem;">Tap card to flip</div></div>'
        + '<button onclick="closeFlashcards()" style="background:transparent;border:none;color:#64748b;font-size:1.3rem;cursor:pointer;padding:4px 8px;border-radius:6px;">✕</button>'
        + '</div>'
        + '<div style="perspective:900px;height:180px;cursor:pointer;margin:16px 0 12px;" onclick="fcFlip()">'
        + '<div class="fc-inner" id="fcInner" style="position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);border-radius:16px;">'
        + '<div id="fcFront" style="position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 20px;text-align:center;"></div>'
        + '<div id="fcBack"  style="position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;transform:rotateY(180deg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 20px;text-align:center;"></div>'
        + '</div></div>'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">'
        + '<button onclick="fcPrev()" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#e2e8f0;border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;">&#8249;</button>'
        + '<span id="fcCounter" style="color:#64748b;font-size:.85rem;"></span>'
        + '<button onclick="fcNext()" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#e2e8f0;border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;">&#8250;</button>'
        + '</div>'
        + '<div id="fcDots" style="display:flex;justify-content:center;gap:5px;flex-wrap:wrap;"></div>'
        + '</div>';
      document.body.appendChild(overlay);
      fcRender();
    }

    function closeFlashcards() {
      var el = document.getElementById('fcOverlay');
      if (el) el.remove();
    }
    // ── MULTI-USER SYSTEM ──
    const BADGE_RULES = [
      { id: 'first_question', label: 'First Question', icon: '🎯', desc: 'Asked your first question', req: q => q >= 1 },
      { id: 'curious',        label: 'Curious Mind',  icon: '🔍', desc: '5 questions asked',        req: q => q >= 5 },
      { id: 'dedicated',      label: 'Dedicated',     icon: '📚', desc: '20 questions asked',       req: q => q >= 20 },
      { id: 'scholar',        label: 'Scholar',       icon: '🎓', desc: '50 questions asked',       req: q => q >= 50 },
      { id: 'streak3',        label: '3-Day Streak',  icon: '🔥', desc: '3 days in a row',          req: (q,u) => (u.streak||0) >= 3 },
      { id: 'streak7',        label: 'Week Warrior',  icon: '⚡', desc: '7-day streak',             req: (q,u) => (u.streak||0) >= 7 },
    ];
    const STAR_THRESHOLDS = [0,10,25,50,100,200];
    function getStars(q){ let s=0; for(let t of STAR_THRESHOLDS){ if(q>=t) s++; } return Math.min(s,5); }
    function defaultUsers(){ return [
      {id:'u1',name:'Engineering Student',role:'Mathematics Learner',color:'#a78bfa',totalQuestions:0,weeklyData:[0,0,0,0,0,0,0],badges:[],streak:0,lastActive:null},
      {id:'u2',name:'Alice',role:'Physics Enthusiast',color:'#60a5fa',totalQuestions:0,weeklyData:[0,0,0,0,0,0,0],badges:[],streak:0,lastActive:null},
      {id:'u3',name:'Bob',role:'Calculus Explorer',color:'#34d399',totalQuestions:0,weeklyData:[0,0,0,0,0,0,0],badges:[],streak:0,lastActive:null},
    ];}
    function loadUsers(){ const s=localStorage.getItem('mu_users'); return s?JSON.parse(s):defaultUsers(); }
    function saveUsers(u){ localStorage.setItem('mu_users',JSON.stringify(u)); }
    function getCurrentUserId(){ return localStorage.getItem('mu_current')||'u1'; }
    function setCurrentUserId(id){ localStorage.setItem('mu_current',id); }
    function getCurrentUser(){ const users=loadUsers(); return users.find(u=>u.id===getCurrentUserId())||users[0]; }
    function awardBadges(u){ BADGE_RULES.forEach(r=>{ if(!u.badges.includes(r.id)&&r.req(u.totalQuestions,u)) u.badges.push(r.id); }); }
    function recordQuestion(uid){
      const users=loadUsers(); const u=users.find(x=>x.id===uid); if(!u) return;
      u.totalQuestions=(u.totalQuestions||0)+1;
      if(!u.weeklyData) u.weeklyData=[0,0,0,0,0,0,0];
      u.weeklyData[new Date().getDay()]++;
      const todayStr=new Date().toDateString();
      if(u.lastActive!==todayStr){ const y=new Date(); y.setDate(y.getDate()-1); u.streak=(u.lastActive===y.toDateString())?(u.streak||0)+1:1; u.lastActive=todayStr; }
      awardBadges(u); saveUsers(users);
    }
    function updateSidebarUser(){
      const u=getCurrentUser();
      document.getElementById('sidebarAvatar').textContent=u.name[0].toUpperCase();
      document.getElementById('sidebarAvatar').style.background=`linear-gradient(135deg,${u.color},#1e293b)`;
      document.getElementById('sidebarName').textContent=u.name;
      document.getElementById('sidebarRole').textContent=u.role;
    }

    // ── SWITCH USER ──
    function openSwitchUser(){ document.getElementById('switchUserModal').style.display='flex'; renderSwitchUserList(); }
    function closeSwitchUser(){ document.getElementById('switchUserModal').style.display='none'; }
    function renderSwitchUserList(){
      const users=loadUsers(); const cur=getCurrentUserId();
      document.getElementById('switchUserList').innerHTML=users.map(u=>`
        <div onclick="switchToUser('${u.id}')" style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;cursor:pointer;border:1px solid ${u.id===cur?'rgba(167,139,250,0.5)':'rgba(255,255,255,0.07)'};background:${u.id===cur?'rgba(167,139,250,0.12)':'rgba(255,255,255,0.03)'};margin-bottom:8px;">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,${u.color},#1e293b);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0;">${u.name[0].toUpperCase()}</div>
          <div style="flex:1;"><div style="color:#e2e8f0;font-size:.9rem;font-weight:500;">${u.name}${u.id===cur?' <span style="color:#a78bfa;font-size:.75rem;">(active)</span>':''}</div><div style="color:#64748b;font-size:.78rem;">${u.role}</div></div>
          <div style="text-align:right;"><div style="color:#fbbf24;font-size:.85rem;">${'⭐'.repeat(getStars(u.totalQuestions||0))}</div><div style="color:#64748b;font-size:.75rem;">${u.totalQuestions||0} questions</div></div>
        </div>`).join('')+`<button onclick="openAddUser()" style="width:100%;padding:10px;border-radius:10px;border:1px dashed rgba(255,255,255,0.15);background:transparent;color:#94a3b8;cursor:pointer;font-size:.875rem;margin-top:4px;">+ Add New Profile</button>`;
    }
    function switchToUser(id){
      setCurrentUserId(id);
      const saved=localStorage.getItem('chatHistory_'+id);
      chatHistory=saved?JSON.parse(saved):[];
      currentChatId=null; renderChatHistory(); updateSidebarUser();
      document.getElementById('question').value='';
      document.getElementById('result').style.display='none';
      document.getElementById('status').textContent='';
      closeSwitchUser();
    }
    function openAddUser(){
      const name=prompt('Enter profile name:'); if(!name||!name.trim()) return;
      const role=prompt('Enter role (e.g. Physics Student):')||'Learner';
      const colors=['#f472b6','#fb923c','#facc15','#4ade80','#22d3ee','#818cf8'];
      const users=loadUsers();
      users.push({id:'u'+Date.now(),name:name.trim(),role:role.trim(),color:colors[Math.floor(Math.random()*colors.length)],totalQuestions:0,weeklyData:[0,0,0,0,0,0,0],badges:[],streak:0,lastActive:null});
      saveUsers(users); renderSwitchUserList();
    }

    // ── PROFILE PANEL ──
    function openProfilePanel(){ const u=getCurrentUser(); document.getElementById('profileModal').style.display='flex'; renderProfilePanel(u); }
    function closeProfilePanel(){ document.getElementById('profileModal').style.display='none'; }
    let activeChartType='bar';
    function renderProfilePanel(u){
      const stars=getStars(u.totalQuestions||0);
      const earned=BADGE_RULES.filter(b=>(u.badges||[]).includes(b.id));
      const locked=BADGE_RULES.filter(b=>!(u.badges||[]).includes(b.id));
      const data=u.weeklyData||[0,0,0,0,0,0,0];
      const total=data.reduce((a,b)=>a+b,0);
      const peak=Math.max(...data);
      const peakDay=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][data.indexOf(peak)];
      const activeDays=data.filter(v=>v>0).length;
      const avg=activeDays?(total/activeDays).toFixed(1):0;
      document.getElementById('profileContent').innerHTML=`
        <div style="text-align:center;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.08);">
          <div style="width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,${u.color},#1e293b);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:30px;margin:0 auto 10px;box-shadow:0 0 20px ${u.color}55;">${u.name[0].toUpperCase()}</div>
          <div style="color:#fff;font-size:1.1rem;font-weight:600;">${u.name}</div>
          <div style="color:#64748b;font-size:.82rem;margin-top:2px;">${u.role}</div>
          <div style="color:#fbbf24;font-size:1.4rem;margin-top:8px;letter-spacing:2px;">${'⭐'.repeat(stars)}${'<span style="opacity:.25">⭐</span>'.repeat(5-stars)}</div>
          <div style="color:#94a3b8;font-size:.75rem;margin-top:4px;">${u.totalQuestions||0} questions · ${u.streak||0} day streak 🔥</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;">
          ${[['📅','This Week',total],['📈','Daily Avg',avg],['🏆','Peak Day',peakDay],['✅','Active Days',activeDays+'/7']].map(([icon,label,val])=>`
            <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 6px;text-align:center;">
              <div style="font-size:1.1rem;">${icon}</div><div style="color:#fff;font-size:1rem;font-weight:600;margin:3px 0;">${val}</div><div style="color:#64748b;font-size:.7rem;">${label}</div>
            </div>`).join('')}

      drawProgressChart(u,type);
    }
    function drawProgressChart(u,type){
      const canvas=document.getElementById('progressChart'); if(!canvas) return;
      const ctx=canvas.getContext('2d');
      const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      // Use real data if available, otherwise show demo data so chart is visible
      const rawData=u.weeklyData||[0,0,0,0,0,0,0];
      const hasRealData=rawData.some(v=>v>0);
      const data=hasRealData?rawData:[2,5,3,8,4,7,6]; // demo data when no activity yet
      const W=canvas.width,H=canvas.height;
      const pad={top:24,bottom:30,left:36,right:16};
      const cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;
      const maxVal=Math.max(...data,1);
      ctx.clearRect(0,0,W,H);

      // Grid lines
      ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
      for(let i=0;i<=4;i++){
        const y=pad.top+cH-(i/4)*cH;
        ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
        ctx.fillStyle='#475569';ctx.font='9px Segoe UI';ctx.textAlign='right';
        ctx.fillText(Math.round((i/4)*maxVal),pad.left-4,y+3);
      }

      const slotW=cW/7;
      if(type==='bar'){
        // Stock-market style: red (low) → yellow (mid) → green (high)
        const barW=slotW*0.55;
        data.forEach((val,i)=>{
          const x=pad.left+i*slotW+(slotW-barW)/2;
          const bH=Math.max((val/maxVal)*cH,3);
          const y=pad.top+cH-bH;
          const ratio=val/maxVal; // 0=red, 0.5=yellow, 1=green
          let r,g;
          if(ratio<0.5){ r=220; g=Math.round(ratio*2*200); }
          else { r=Math.round((1-(ratio-0.5)*2)*220); g=200+Math.round((ratio-0.5)*2*35); }
          const topColor=`rgb(${r},${g},0)`;
          const botColor=`rgba(${r},${g},0,0.25)`;
          const grad=ctx.createLinearGradient(0,y,0,y+bH);
          grad.addColorStop(0,topColor); grad.addColorStop(1,botColor);
          ctx.fillStyle=grad;
          ctx.beginPath();ctx.roundRect(x,y,barW,bH,[4,4,0,0]);ctx.fill();
          // Border
          ctx.strokeStyle=topColor;ctx.lineWidth=1;
          ctx.beginPath();ctx.roundRect(x,y,barW,bH,[4,4,0,0]);ctx.stroke();
          // Value label
          ctx.fillStyle='#e2e8f0';ctx.font='bold 10px Segoe UI';ctx.textAlign='center';
          ctx.fillText(hasRealData?val:'',x+barW/2,y-5);
          // Day label
          ctx.fillStyle='#64748b';ctx.font='10px Segoe UI';ctx.textAlign='center';
          ctx.fillText(days[i],x+barW/2,H-8);
        });
        // Legend label
        if(!hasRealData){
          ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='italic 10px Segoe UI';ctx.textAlign='center';
          ctx.fillText('Demo data — start solving to track progress',W/2,pad.top-8);
        }
      } else {
        // Line chart — smooth curve with area fill
        const pts=data.map((val,i)=>({x:pad.left+i*slotW+slotW/2,y:pad.top+cH-(val/maxVal)*cH}));
        const ag=ctx.createLinearGradient(0,pad.top,0,pad.top+cH);
        ag.addColorStop(0,(u.color||'#a78bfa')+'55');ag.addColorStop(1,'transparent');
        ctx.beginPath();ctx.moveTo(pts[0].x,pad.top+cH);
        pts.forEach(p=>ctx.lineTo(p.x,p.y));
        ctx.lineTo(pts[pts.length-1].x,pad.top+cH);ctx.closePath();ctx.fillStyle=ag;ctx.fill();
        ctx.beginPath();ctx.strokeStyle=u.color||'#a78bfa';ctx.lineWidth=2.5;ctx.lineJoin='round';
        pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
        pts.forEach((p,i)=>{
          ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);
          ctx.fillStyle=u.color||'#a78bfa';ctx.fill();
          ctx.strokeStyle='#111';ctx.lineWidth=1.5;ctx.stroke();
          if(hasRealData&&data[i]>0){ctx.fillStyle='#e2e8f0';ctx.font='bold 10px Segoe UI';ctx.textAlign='center';ctx.fillText(data[i],p.x,p.y-9);}
          ctx.fillStyle='#64748b';ctx.font='10px Segoe UI';ctx.textAlign='center';ctx.fillText(days[i],p.x,H-8);
        });
        if(!hasRealData){
          ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='italic 10px Segoe UI';ctx.textAlign='center';
          ctx.fillText('Demo data — start solving to track progress',W/2,pad.top-8);
        }
      }
    }

    // ── SIDEBAR FUNCTIONALITY ──
    let chatHistory = [];
    let currentChatId = null;

    // Initialize chat history
    function initializeChatHistory() {
      const uid=getCurrentUserId();
      const savedChats = localStorage.getItem('chatHistory_'+uid)||localStorage.getItem('chatHistory');
      if (savedChats) { chatHistory = JSON.parse(savedChats); renderChatHistory(); }
      updateSidebarUser();
    }

    // Start new chat
    function startNewChat() {
      currentChatId = Date.now().toString();
      document.getElementById('question').value = '';
      document.getElementById('result').style.display = 'none';
      document.getElementById('status').textContent = '';
      
      // Remove active class from all chat items
      document.querySelectorAll('.chat-item').forEach(item => {
        item.classList.remove('active');
      });
    }

    // Save chat to history
    function saveChatToHistory(question, answer) {
      const uid=getCurrentUserId();
      const chat = {
        id: currentChatId || Date.now().toString(),
        question: question.substring(0, 100) + (question.length > 100 ? '...' : ''),
        answer: answer,
        timestamp: new Date().toISOString(),
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
      };
      chatHistory = chatHistory.filter(c => c.id !== chat.id);
      chatHistory.unshift(chat);
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(0, 20);
      localStorage.setItem('chatHistory_'+uid, JSON.stringify(chatHistory));
      recordQuestion(uid);
      renderChatHistory();
    }

    // Render chat history
    function renderChatHistory() {
      const chatList = document.getElementById('chatList');
      if (chatHistory.length === 0) {
        chatList.innerHTML = '<div style="color: #64748b; font-size: 12px; text-align: center; padding: 20px;">No recent chats</div>';
        return;
      }

      chatList.innerHTML = chatHistory.map(chat => `
        <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="loadChat('${chat.id}')">
          <div class="chat-preview">${chat.question}</div>
          <div class="chat-time">${chat.time}</div>
        </div>
      `).join('');

    // Load specific chat
    function loadChat(chatId) {
      const chat = chatHistory.find(c => c.id === chatId);
      if (chat) {
        currentChatId = chatId;
        document.getElementById('question').value = chat.question.replace('...', '');

        const result = document.getElementById('result');
        result.style.display = 'block';
        result.innerHTML = `<h2>Solution</h2><div class="answer">${chat.answer}</div>`;
        
        renderChatHistory();

    // ── STEP BUILDER ──
    // Correct order indices: 0,1,2,3 (already in correct order in the data)
    const SB_STEPS = [
      { id:0, text:'Identify the function: f(x) = x² + 3x' },
      { id:1, text:'Apply power rule to x²: d/dx(x²) = 2x' },
      { id:2, text:'Apply power rule to 3x: d/dx(3x) = 3' },
      { id:3, text:'Combine results: f\'(x) = 2x + 3' },
    ];
    let sbOrder = [];

    function openStepBuilder() {
      const shuffled = [...SB_STEPS].sort(() => Math.random()-0.5);
      sbOrder = shuffled.map(s => s.id);
      const html = `
        <p style="color:#94a3b8;margin-bottom:14px;">Arrange the steps in the correct order to differentiate <strong style="color:#a78bfa;">f(x) = x² + 3x</strong>. Click steps to move them up/down.</p>
        <div id="sbList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
          ${shuffled.map((s,i) => `
            <div id="sb-${s.id}" data-idx="${i}" style="background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);padding:12px 14px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;">
              <span style="color:#e2e8f0;font-size:.9rem;">${s.text}</span>
              <div style="display:flex;gap:4px;flex-shrink:0;">

                <button onclick="sbMove(${s.id},1)"  style="background:rgba(255,255,255,0.08);border:none;color:#94a3b8;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:.85rem;">▼</button>
              </div>
            </div>`).join('')}
        </div>
        <button onclick="checkStepOrder()" style="background:#7c3aed;color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:.9rem;width:100%;">✅ Check Order</button>
        <div id="sbResult"></div>`;

    function sbMove(id, dir) {
      const list = document.getElementById('sbList');
      const items = [...list.children];
      const idx = items.findIndex(el => el.id === 'sb-'+id);
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= items.length) return;
      if (dir === -1) list.insertBefore(items[idx], items[newIdx]);
      else list.insertBefore(items[newIdx], items[idx]);
    }

    function checkStepOrder() {
      const list = document.getElementById('sbList');
      const userOrder = [...list.children].map(el => parseInt(el.id.replace('sb-','')));
      const correct = [0,1,2,3];
      let score = 0;
      userOrder.forEach((id, i) => { if (id === correct[i]) score++; });
      const feedback = score===4 ? 'You nailed the derivative steps!' : `Steps ${userOrder.map((id,i)=>id!==correct[i]?i+1:null).filter(Boolean).join(', ')} are out of place.`;
      document.getElementById('sbResult').innerHTML = gameResult(score===4, score, 4, feedback);
    }

      { q:'Quadratic formula: x = (−b ± √(b² − ___)) / ___', blanks:['4ac','2a'], hint:'Discriminant and denominator' },
      { q:'Pythagorean theorem: a² + b² = ___',               blanks:['c²'],       hint:'Sum of squares of two sides' },
      { q:'Area of circle: A = ___ × r²',                     blanks:['π'],        hint:'Greek letter pi' },

    function openFormulaQuest() {
      const html = `
        <p style="color:#94a3b8;margin-bottom:14px;">Fill in the blanks to complete each formula. Answers are case-insensitive.</p>
        <div id="fqList" style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px;">

    function checkFormulas() {
      let score = 0, total = 0;
      const wrong = [];
      FQ_QUESTIONS.forEach((q, qi) => {
        let qCorrect = true;
        q.blanks.forEach((ans, bi) => {
          total++;

        });
        document.getElementById(`fq-icon-${qi}`).textContent = qCorrect ? '✅' : '❌';
      });
      const feedback = score===total ? 'All formulas correct — excellent work!' : `Wrong: ${wrong.join('; ')}`;

    // ── MATH DOODLE BACKGROUND ──
    const canvas = document.getElementById('mathCanvas');
    const ctx = canvas.getContext('2d');

    // Chalk-like colors on black
    const chalkColors = [
      'rgba(255,255,255,0.18)', 'rgba(255,255,255,0.12)',
      'rgba(180,180,255,0.2)',  'rgba(150,255,200,0.15)',
      'rgba(255,200,150,0.15)', 'rgba(200,150,255,0.18)'
    ];

    function rnd(min, max) { return min + Math.random() * (max - min); }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      drawDoodles();
    }

    function chalkStroke(c) {
      ctx.strokeStyle = c;
      ctx.lineWidth = rnd(0.8, 1.8);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.setLineDash([]);
    }

    // Wobbly line helper (hand-drawn feel)
    function wobblyLine(x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      const mx = (x1 + x2) / 2 + rnd(-6, 6);
      const my = (y1 + y2) / 2 + rnd(-6, 6);
      ctx.quadraticCurveTo(mx, my, x2, y2);
      ctx.stroke();
    }

    function drawTriangle(x, y, size, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      chalkStroke(color);
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.866, size * 0.5);
      ctx.lineTo(-size * 0.866, size * 0.5);
      ctx.closePath();
      ctx.stroke();
      // right angle mark
      ctx.beginPath();
      ctx.moveTo(-size * 0.866 + 10, size * 0.5);
      ctx.lineTo(-size * 0.866 + 10, size * 0.5 - 10);
      ctx.lineTo(-size * 0.866, size * 0.5 - 10);
      ctx.stroke();
      ctx.restore();
    }

    function drawProtractor(x, y, r, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      chalkStroke(color);
      // semicircle
      ctx.beginPath();
      ctx.arc(0, 0, r, Math.PI, 0);
      ctx.stroke();
      // base line
      wobblyLine(-r, 0, r, 0);
      // tick marks
      for (let a = 0; a <= 180; a += 30) {
        const rad = (a * Math.PI) / 180;
        const len = a % 90 === 0 ? 12 : 7;
        ctx.beginPath();
        ctx.moveTo(Math.cos(Math.PI - rad) * r, Math.sin(Math.PI - rad) * -r);
        ctx.lineTo(Math.cos(Math.PI - rad) * (r - len), Math.sin(Math.PI - rad) * -(r - len));
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawRuler(x, y, len, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      chalkStroke(color);
      // body
      ctx.strokeRect(-len / 2, -10, len, 20);
      // ticks
      for (let i = 0; i <= len; i += 12) {
        const h = i % 60 === 0 ? 14 : i % 24 === 0 ? 10 : 6;
        ctx.beginPath();
        ctx.moveTo(-len / 2 + i, -10);
        ctx.lineTo(-len / 2 + i, -10 + h);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawSineWave(x, y, width, color) {
      ctx.save();
      ctx.translate(x, y);
      chalkStroke(color);
      ctx.beginPath();
      for (let i = 0; i <= width; i += 2) {
        const wy = Math.sin((i / width) * Math.PI * 4) * 22 + rnd(-1, 1);
        i === 0 ? ctx.moveTo(i, wy) : ctx.lineTo(i, wy);
      }
      ctx.stroke();
      // axis
      wobblyLine(-10, 0, width + 10, 0);
      ctx.restore();
    }

    function drawCube(x, y, size, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      chalkStroke(color);
      const h = size * 0.5;
      // front face
      ctx.strokeRect(-size / 2, -size / 2, size, size);
      // back face offset
      ctx.strokeRect(-size / 2 + h, -size / 2 - h, size, size);
      // connecting lines
      wobblyLine(-size / 2, -size / 2, -size / 2 + h, -size / 2 - h);
      wobblyLine(size / 2, -size / 2, size / 2 + h, -size / 2 - h);
      wobblyLine(size / 2, size / 2, size / 2 + h, size / 2 - h);
      wobblyLine(-size / 2, size / 2, -size / 2 + h, size / 2 - h);
      // dashed hidden lines
      ctx.setLineDash([3, 4]);
      wobblyLine(-size / 2 + h, size / 2 - h, -size / 2, size / 2);
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawCompass(x, y, size, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      chalkStroke(color);
      // two legs
      wobblyLine(0, 0, -size * 0.4, size);
      wobblyLine(0, 0, size * 0.4, size);
      // hinge circle
      ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.stroke();
      // arc drawn by compass
      ctx.beginPath();
      ctx.arc(0, size * 0.85, size * 0.45, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
      ctx.restore();
    }

    function drawFormula(x, y, text, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = color;
      ctx.font = `italic ${rnd(18, 28)}px Georgia, serif`;  // Increased from 14-22 to 18-28
      ctx.fillText(text, 0, 0);
      ctx.restore();
    }

    function drawAxes(x, y, size, angle, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      chalkStroke(color);
      wobblyLine(-size, 0, size, 0);
      wobblyLine(0, size, 0, -size);
      // arrowheads
      ctx.beginPath(); ctx.moveTo(size, 0); ctx.lineTo(size - 8, -5); ctx.lineTo(size - 8, 5); ctx.closePath(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -size); ctx.lineTo(-5, -size + 8); ctx.lineTo(5, -size + 8); ctx.closePath(); ctx.stroke();
      ctx.restore();
    }

    const formulas = [
      'y = sin x', 'y = cos x', 'E = mc²', 'F = ma', 'a² + b² = c²',
      'y = 3x + 6', 'V = x²l', '∫f(x)dx', '∑nᵢ', 'lim x→0',
      'π ≈ 3.14', '∂f/∂x', 'λ', 'μ', 'θ = 30°', 'C = a² + b²',
      'y = √x', 'log₂n', 'Δx', '∞', 'α + β', 'ω', 'σ²'
    ];

    function drawDoodles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const W = canvas.width, H = canvas.height;
      const cols = Math.ceil(W / 180);  // Reduced from 220 to make patterns larger
      const rows = Math.ceil(H / 160);  // Reduced from 200 to make patterns larger

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const bx = c * 180 + rnd(10, 60);  // Adjusted spacing
          const by = r * 160 + rnd(10, 60);  // Adjusted spacing
          const color = pick(chalkColors);
          const angle = rnd(-0.4, 0.4);
          const type = Math.floor(rnd(0, 7));

          ctx.globalAlpha = 1;
          if (type === 0) drawTriangle(bx, by, rnd(45, 75), angle, color);        // Increased from 30-55 to 45-75
          else if (type === 1) drawProtractor(bx, by, rnd(50, 75), angle, color); // Increased from 35-55 to 50-75
          else if (type === 2) drawRuler(bx, by, rnd(120, 180), angle, color);    // Increased from 80-130 to 120-180
          else if (type === 3) drawSineWave(bx, by, rnd(120, 200), color);        // Increased from 80-140 to 120-200
          else if (type === 4) drawCube(bx, by, rnd(45, 70), angle, color);       // Increased from 30-50 to 45-70
          else if (type === 5) drawCompass(bx, by, rnd(45, 70), angle, color);    // Increased from 30-50 to 45-70
          else if (type === 6) drawAxes(bx, by, rnd(45, 70), angle, color);       // Increased from 30-50 to 45-70

          // scatter formulas everywhere
          drawFormula(bx + rnd(-40, 100), by + rnd(-40, 100), pick(formulas), rnd(-0.3, 0.3), pick(chalkColors)); // Increased spread
        }
      }
    }

    window.addEventListener('resize', resize);
    resize();

    // ── SOLVE ──
    async function solve() {
      const q = document.getElementById('question').value.trim();
      if (!q) return;
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      status.textContent = 'Sending to model...';
      result.style.display = 'none';
      
      // Set current chat ID if not exists
      if (!currentChatId) {
        currentChatId = Date.now().toString();
      }
      
      try {
        const res = await fetch('http://localhost:8080/api/solve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q }),
          signal: AbortSignal.timeout(60000)
        });
        const data = await res.json();
        status.textContent = '';
        result.style.display = 'block';
        
        let answerText = '';
        
        if (data.error || !data.success) {
          const errorMsg = data.error || 'Unknown error';
          result.innerHTML = `<div class="answer-card"><div style="padding:16px 18px;color:#f87171;display:flex;gap:8px;align-items:center;">❌ <span>${errorMsg}</span></div></div>`;
          answerText = `Error: ${errorMsg}`;
        } else {
          // Step icons cycling
          const stepIcons = ['🔍','📐','🧮','⚙️','📊','🔗','✏️','🎯','💡','🏁'];

          // ── Steps ──
          let stepsHtml = '';
          if (data.steps && data.steps.length > 0) {
            const stepRows = data.steps.map((s, i) => {
              const text = s.replace(/^Step\s*\d+[:\-\.]?\s*/i, '');
              const icon = stepIcons[i % stepIcons.length];
              // Bold anything between ** **
              const formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
              return `<div class="step-row">
                <div class="step-bubble">${i+1}</div>
                <div class="step-content">${icon} ${formatted}</div>
              </div>`;
            }).join('');
            stepsHtml = `
              <div class="ans-steps">
                <div class="steps-header open" onclick="toggleSteps(this)">
                  <div class="steps-header-left">📋 Step-by-Step Solution <span style="background:rgba(167,139,250,0.2);color:#a78bfa;border-radius:20px;padding:2px 8px;font-size:11px;margin-left:6px;">${data.steps.length} steps</span></div>
                  <span class="arrow">▼</span>
                </div>
                <div class="steps-list open">${stepRows}</div>
              </div>`;
          }

          // ── Concepts ──
          let conceptsHtml = '';
          if (data.mathematical_concepts && data.mathematical_concepts.length > 0) {
            const tags = data.mathematical_concepts.map(c =>
              `<span class="concept-tag">🏷️ ${c}</span>`).join('');
            conceptsHtml = `<div class="ans-concepts"><span class="ans-concepts-label">📚 Concepts:</span>${tags}</div>`;
          }

          // ── Verification ──
          let verifyHtml = '';
          if (data.verification) {
            verifyHtml = `<div class="ans-verify">✅ <span><strong>Verify:</strong> ${data.verification}</span></div>`;
          }

          // ── Tips ──
          let tipsHtml = '';
          if (data.mathematical_tips && data.mathematical_tips.length > 0) {
            const tipItems = data.mathematical_tips.map(t => `<div>💡 ${t}</div>`).join('');
            tipsHtml = `<div class="ans-tips"><div class="ans-tips-title">🎓 Learning Tips</div>${tipItems}</div>`;
          }

          // ── Badges ──
          const conf = data.confidence || 'high';
          const confClass = conf === 'high' ? 'badge-high' : 'badge-medium';
          const confIcon = conf === 'high' ? '🟢' : '🟡';
          const sourceIcon = data.source && data.source.includes('Gemini') ? '🤖' :
                             data.source && data.source.includes('OpenAI') ? '🧠' : '📖';

          const solutionHtml = `
            <div class="answer-card">
              <div class="answer-banner">
                <div class="answer-banner-left">
                  <span style="font-size:20px;">🎓</span>
                  <h2>Solution</h2>
                  <span class="badge badge-source">${sourceIcon} ${data.source || 'Built-in'}</span>
                </div>
                <span class="badge ${confClass}">${confIcon} ${conf} confidence</span>
              </div>

              <div class="ans-question">
                <span class="q-icon">❓</span>
                <span>${data.question}</span>
              </div>

              <div class="ans-summary">
                <span class="s-icon">💡</span>
                <div class="ans-summary-text">${data.solution}</div>
              </div>

              ${stepsHtml}
              ${conceptsHtml}
              ${verifyHtml ? `<div style="height:12px;"></div>${verifyHtml}` : ''}
              ${tipsHtml}
            </div>`;

          result.innerHTML = solutionHtml;
          answerText = data.solution || 'Solution provided';

          // Trigger MathJax
          if (window.MathJax) MathJax.typesetPromise([result]).catch(()=>{});

          // Auto-scroll
          const chatArea = document.getElementById('chatArea');
          if (chatArea) setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 100);
        }
        
        // Save to chat history
        saveChatToHistory(q, answerText);
        
      } catch (err) {
        status.textContent = '';
        result.style.display = 'block';
        const errorMsg = err.name === 'TimeoutError' ? 'Request timed out (60s). Please try again.' : 'Could not reach the server. Make sure app.py is running.';
        result.innerHTML = `<h2>Result</h2><div class="error">${errorMsg}</div>`;
        
        // Save error to chat history too
        saveChatToHistory(q, `Error: ${errorMsg}`);
      }
      
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send`;
    }

    document.getElementById('question').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.ctrlKey) solve();
    });

    // Toggle collapsible steps
    function toggleSteps(btn) {
      btn.classList.toggle('open');
      // works for both old .steps-body and new .steps-list
      const body = btn.nextElementSibling;
      if (body) body.classList.toggle('open');
    }

    // ── VOICE ──
    let recognition = null, isListening = false;
    function toggleVoice() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('Speech recognition not supported. Try Chrome.'); return; }
      const btn = document.getElementById('voiceBtn');
      if (isListening) { recognition.stop(); return; }
      recognition = new SR();
      recognition.lang = 'en-US';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.onstart = () => { isListening = true; btn.classList.add('active'); btn.title = 'Listening... click to stop'; };
      recognition.onresult = e => {
        const t = e.results[0][0].transcript;
        const ta = document.getElementById('question');
        ta.value += (ta.value ? ' ' : '') + t;
      };
      recognition.onend = () => { isListening = false; btn.classList.remove('active'); btn.title = 'Voice input'; };
      recognition.onerror = e => { isListening = false; btn.classList.remove('active'); alert('Voice error: ' + e.error); };
      recognition.start();
    }

    // ── CAMERA ──
    let stream = null;
    async function openCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('video').srcObject = stream;
        document.getElementById('cameraModal').classList.add('open');
      } catch (e) { alert('Camera access denied or not available.'); }
    }
    function capturePhoto() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const imageData = canvas.toDataURL('image/png');
      closeCamera();
      const ta = document.getElementById('question');
      ta.value += (ta.value ? '\n' : '') + '[Image captured — describe what you see or ask about it]';
      ta.focus();
      const result = document.getElementById('result');
      result.style.display = 'block';
      result.innerHTML = `<h2>Captured Image</h2><img src="${imageData}" style="width:100%;border-radius:10px;margin-top:8px">`;
    }
    function closeCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      document.getElementById('cameraModal').classList.remove('open');
    }
  </script>

  <!-- SWITCH USER MODAL -->
  <div id="switchUserModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);z-index:9999;align-items:center;justify-content:center;" onclick="if(event.target===this)closeSwitchUser()">
    <div style="background:#202123;border-radius:14px;width:400px;max-width:95vw;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08);position:relative;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <h3 style="color:#fff;font-size:1rem;font-weight:600;">Switch Profile</h3>
        <button onclick="closeSwitchUser()" style="background:transparent;border:none;color:#8e8ea0;font-size:1.1rem;cursor:pointer;padding:4px 8px;border-radius:6px;">✕</button>
      </div>
      <div id="switchUserList"></div>
    </div>
  </div>

  <!-- PROFILE PANEL MODAL -->
  <div id="profileModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);z-index:9999;align-items:center;justify-content:center;" onclick="if(event.target===this)closeProfilePanel()">
    <div style="background:#202123;border-radius:14px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:28px;box-shadow:0 24px 60px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08);position:relative;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <h3 style="color:#fff;font-size:1rem;font-weight:600;">My Profile</h3>
        <button onclick="closeProfilePanel()" style="background:transparent;border:none;color:#8e8ea0;font-size:1.1rem;cursor:pointer;padding:4px 8px;border-radius:6px;">✕</button>
      </div>
      <div id="profileContent"></div>
    </div>
  </div>
